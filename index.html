<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strickledeweg PV Dashboard v8 — Switch Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--green:#004225;--green-mid:#1A3A2A;--green-light:#E8F0EC;--gold:#C6A75E;--marine:#1F3A5F;--stone:#B7B1A3;--off-white:#F5F3EF;--dark:#1C1C1C;--white:#FFFFFF;--curtail:#C0392B;--border:#E2DFDA}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hanken Grotesk',Calibri,system-ui,sans-serif;color:var(--dark);background:var(--white);padding:24px;max-width:960px;margin:0 auto;line-height:1.4}
.header{border-bottom:2px solid var(--gold);padding-bottom:12px;margin-bottom:20px}
.header-label{font-size:9px;color:var(--stone);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
.header-row h1{font-size:20px;font-weight:700;color:var(--green-mid)}
.header-row .sub{font-size:12px;color:var(--stone)}
.controls{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;align-items:flex-end}
.ctrl-group label{display:block;font-size:10px;font-weight:500;color:var(--stone);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.btn-group{display:flex}
.btn-group button{padding:6px 14px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid #ddd;background:var(--white);color:var(--dark);font-weight:400;transition:all .15s}
.btn-group button:first-child{border-radius:4px 0 0 4px}
.btn-group button:last-child{border-radius:0 4px 4px 0}
.btn-group button:not(:first-child){margin-left:-1px}
.btn-group button.active{background:var(--green-light);color:var(--green);border-color:var(--green);font-weight:600;z-index:1;position:relative}
select,input[type=number]{padding:6px 10px;font-size:12px;font-family:inherit;border-radius:4px;border:1px solid #ddd;background:var(--white);color:var(--dark);cursor:pointer;min-width:100px}
input[type=number]{min-width:80px;width:90px}
input[type=range]{width:140px;accent-color:var(--green)}
.sources{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.source-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--green);background:var(--green-light);color:var(--green);transition:all .15s}
.source-tag.off{border-color:#ddd;background:var(--off-white);color:var(--stone)}
.source-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.source-tag.off .dot{background:var(--stone)}
.source-add{display:inline-flex;align-items:center;gap:2px;padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer;border:1px dashed var(--stone);color:var(--stone);background:transparent;font-family:inherit}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--off-white);border-radius:6px;padding:12px 14px;border-left:3px solid transparent}
.kpi.accent{border-left-color:var(--green)}
.kpi.warn{border-left-color:var(--curtail)}
.kpi-label{font-size:10px;color:var(--stone);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.kpi-value{font-size:19px;font-weight:600;color:var(--green-mid)}
.kpi.warn .kpi-value{color:var(--curtail)}
.kpi-sub{font-size:11px;color:var(--stone);margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:var(--stone)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-line{width:16px;height:0;border-top:2px dashed var(--stone)}
.chart-wrap{background:var(--white);border-radius:8px;border:.5px solid var(--border);padding:12px 8px 8px}
.chart-container{position:relative;width:100%;height:370px}
.balance{margin-top:20px;border-top:2px solid var(--gold);padding-top:14px}
.balance-label{font-size:9px;color:var(--stone);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:13px}
.bal-row{display:flex;justify-content:space-between;padding:3px 0}
.bal-row.bold{font-weight:600}
.bal-row.sub{color:var(--stone);font-size:12px}
.bal-row.warn{color:var(--curtail)}
.footer{margin-top:20px;padding-top:8px;border-top:.5px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--stone)}
@media(max-width:640px){body{padding:12px}.kpi-grid{grid-template-columns:repeat(2,1fr)}.balance-grid{grid-template-columns:1fr}.chart-container{height:280px}}
</style>
</head>

function compute(){
const scale=state.pvKwp/BASE, lim=state.fiLimitKw;
let buckets={};
let periodLabel='',labelKey='';

for(let i=0;i<N;i++){
  const m=H.m[i],d=H.d[i],hr=H.h[i],w=H.w[i];
  const co=H.co[i]; // consumption unchanged
  // Original PV production at base capacity = own consumption + grid export
  const pvBase=H.oc[i]+H.ge[i];
  // Scale PV production linearly
  const pvScaled=pvBase*scale;
  // Own consumption = min of scaled PV and actual consumption (can't use more than demand)
  const oc=Math.min(pvScaled, co);
  // Surplus after own consumption
  const surplus=pvScaled-oc;
  // Apply feed-in limit (kW, and since 1h resolution: kW = kWh)
  const fi=Math.min(surplus, lim);
  // Curtailment = what can't be fed in
  const curt=surplus-fi;
  // Grid import = consumption not covered by PV
  const gi=co-oc;

  // Determine bucket key
  let key;
  if(state.period==='year') key=String(m);
  else if(state.period==='month'){if(m!==state.month) continue; key=String(d);}
  else if(state.period==='day'){if(m!==state.dayMonth||d!==state.dayDay) continue; key=String(hr);}
  else{if(w!==state.week) continue; key=m+'/'+d;}

  if(!buckets[key]) buckets[key]={oc:0,fi:0,curt:0,gi:0,co:0,pv:0};
  buckets[key].oc+=oc;
  buckets[key].fi+=fi;
  buckets[key].curt+=curt;
  buckets[key].gi+=gi;
  buckets[key].co+=co;
  buckets[key].pv+=pvScaled;
}

let labels=[],data=[];

  for(let m=1;m<=12;m++){const k=String(m);labels.push(MN[m-1]);data.push(buckets[k]||{oc:0,fi:0,curt:0,gi:0,co:0});}

  periodLabel=MNF[state.month-1];
  const days=[31,28,31,30,31,30,31,31,30,31,30,31][state.month-1];
  for(let d=1;d<=days;d++){const k=String(d);labels.push(String(d));data.push(buckets[k]||{oc:0,fi:0,curt:0,gi:0,co:0});}
}else if(state.period==='day'){
  periodLabel=state.dayDay+' '+MNF[state.dayMonth-1];
  for(let h=0;h<24;h++){const k=String(h);labels.push(String(h).padStart(2,'0')+':00');data.push(buckets[k]||{oc:0,fi:0,curt:0,gi:0,co:0});}
}else{
  periodLabel='Week '+state.week;
  const dayNames=['Ma','Di','Wo','Do','Vr','Za','Zo'];let idx=0;
  Object.keys(buckets).sort((a,b)=>{const [am,ad]=a.split('/').map(Number),[bm,bd]=b.split('/').map(Number);return am-bm||ad-bd;}).forEach(k=>{
    labels.push(dayNames[idx%7]+' '+k);data.push(buckets[k]);idx++;
  });
}

const sum=(fn)=>data.reduce((s,d)=>s+fn(d),0);
const totCo=sum(d=>d.co),totOc=sum(d=>d.oc),totFI=sum(d=>d.fi),totCurt=sum(d=>d.curt),totGi=sum(d=>d.gi);
const totPV=totOc+totFI+totCurt;
const selfSuff=totCo>0?(totOc/totCo*100):0;
const specYield=state.pvKwp>0?totPV/state.pvKwp:0;
const co2=totPV*.38;

return{labels,data,periodLabel,kpis:{totCo,totOc,totFI,totCurt,totGi,totPV,selfSuff,specYield,co2}};
}

function render(){
const{labels,data,periodLabel,kpis}=compute();
const hasCurt=kpis.totCurt>1;
const srcNames=state.sources.filter(s=>s.on).map(s=>s.name).join(' + ');
document.getElementById('sysInfo').textContent=state.pvKwp+' kWp | JA Solar 460Wp | 2× Huawei 50KTL';

// KPIs
let k='';
k+=kpiCard('Totale consumptie',fmt(kpis.totCo)+' kWh',periodLabel);
k+=kpiCard('PV-opwek totaal',fmt(kpis.totPV)+' kWh',fmtD(kpis.specYield,0)+' kWh/kWp','accent');
k+=kpiCard('Eigen verbruik PV',fmt(kpis.totOc)+' kWh',fmtD(kpis.totCo>0?kpis.totOc/kpis.totCo*100:0,1)+'% van consumptie');
k+=kpiCard('Teruglevering',fmt(kpis.totFI)+' kWh',state.fiLimitKw<100?'Limiet: '+state.fiLimitKw+' kW':'Max '+state.fiLimitKw+' kW');
if(hasCurt) k+=kpiCard('Curtailment',fmt(kpis.totCurt)+' kWh',fmtD(kpis.totPV>0?kpis.totCurt/kpis.totPV*100:0,1)+'% van opwek','warn');
k+=kpiCard('Netafname',fmt(kpis.totGi)+' kWh',fmtD(kpis.totCo>0?kpis.totGi/kpis.totCo*100:0,1)+'% van consumptie');
k+=kpiCard('CO₂ vermeden',fmtD(kpis.co2/1000,1)+' ton','@ 0,38 kg/kWh');
k+=kpiCard('Zelfvoorzieningsgraad',fmtD(kpis.selfSuff,1)+'%','PV eigen verbr. / totaal','accent');
document.getElementById('kpiGrid').innerHTML=k;

// Legend
let l='';l+=legItem('#004225','Eigen verbruik PV');l+=legItem('#C6A75E','Teruglevering');
if(hasCurt) l+=legItem('#C0392B','Curtailment');
l+=legItem('#1F3A5F','Netafname');l+='<span class="legend-item"><span class="legend-line"></span>Totale consumptie</span>';l+='<span class="legend-item"><span style="width:16px;height:0;border-top:2px dashed #004225"></span>PV-opwek</span>';
document.getElementById('legend').innerHTML=l;

// Chart
renderChart(labels,data,hasCurt);

// Balance
document.getElementById('balLabel').textContent='Energiebalans — '+periodLabel;
let b='<div>';
b+=balRow('Consumptie totaal',kpis.totCo,'bold');
b+=balRow('  ↳ Waarvan '+srcNames,kpis.totCo,'sub');
b+='</div><div>';
b+=balRow('PV-opwek totaal',kpis.totPV,'bold');
b+=balRow('  ↳ Eigen verbruik',kpis.totOc,'sub');
b+=balRow('  ↳ Teruglevering',kpis.totFI,'sub');
if(hasCurt) b+=balRow('  ↳ Curtailment',kpis.totCurt,'sub warn');
b+='</div>';
document.getElementById('balGrid').innerHTML=b;
}

function kpiCard(l,v,s,c){return'<div class="kpi '+(c||'')+'"><div class="kpi-label">'+l+'</div><div class="kpi-value">'+v+'</div><div class="kpi-sub">'+s+'</div></div>'}
function legItem(c,l){return'<span class="legend-item"><span class="legend-dot" style="background:'+c+'"></span>'+l+'</span>'}
function balRow(l,v,c){return'<div class="bal-row '+(c||'')+'"><span>'+l+'</span><span>'+fmt(v)+' kWh</span></div>'}

function renderChart(labels,data,hasCurt){
const ds=[
{label:'Eigen verbruik PV',data:data.map(d=>d.oc),backgroundColor:'#004225',stack:'pv',order:2},
{label:'Teruglevering',data:data.map(d=>d.fi),backgroundColor:'#C6A75E',stack:'fi',order:2,barPercentage:0.6}];
if(hasCurt) ds.push({label:'Curtailment',data:data.map(d=>d.curt),backgroundColor:'rgba(192,57,43,0.7)',stack:'curt',order:2,barPercentage:0.6});
ds.push({label:'Netafname',data:data.map(d=>d.gi),backgroundColor:'#1F3A5F',stack:'grid',order:2});
ds.push({label:'Consumptie',data:data.map(d=>d.co),type:'line',borderColor:'#B7B1A3',borderWidth:2,borderDash:[6,3],pointRadius:labels.length<=14?3:0,pointBackgroundColor:'#B7B1A3',fill:false,order:1});
ds.push({label:'PV-opwek',data:data.map(d=>d.pv),type:'line',borderColor:'#004225',borderWidth:2,borderDash:[6,3],pointRadius:labels.length<=14?3:0,pointBackgroundColor:'#004225',fill:false,order:1});
if(chart) chart.destroy();
chart=new Chart(document.getElementById('mainChart'),{type:'bar',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#1C1C1C',bodyColor:'#1C1C1C',borderColor:'#E2DFDA',borderWidth:1,padding:10,titleFont:{family:"'Hanken Grotesk'",weight:'600',size:13},bodyFont:{family:"'Hanken Grotesk'",size:12},callbacks:{label:function(c){return c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString('nl-NL')+' kWh'}}}},scales:{x:{ticks:{autoSkip:labels.length>20,maxRotation:labels.length>14?45:0,font:{family:"'Hanken Grotesk'",size:11},color:'#B7B1A3'},grid:{display:false}},y:{stacked:false,beginAtZero:true,grid:{color:'#E8E5E0',lineWidth:.5},ticks:{callback:v=>v>=1000?Math.round(v/1000)+'k':Math.round(v),font:{family:"'Hanken Grotesk'",size:11},color:'#B7B1A3'},title:{display:true,text:'kWh',font:{family:"'Hanken Grotesk'",size:11},color:'#B7B1A3'}}}}});
}

document.addEventListener('DOMContentLoaded',initUI);
</script>
</body>
</html>
